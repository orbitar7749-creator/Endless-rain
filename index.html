<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Productivity Hub</title>
    <style>
        :root {
            --glass-core: rgba(0, 15, 0, 0.4);
            --accent: #a8e6cf;
            --white-soft: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
        }

        /* --- VIDEO BACKGROUND --- */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -10;
            transform: translate(-50%, -50%);
            object-fit: cover;
            pointer-events: none;
        }

        /* Subtle dark overlay to make text pop */
        .scrim {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: -5;
        }

        /* --- MUSIC ICON (TOP CENTER/RIGHT) --- */
        .music-node {
            position: absolute;
            top: 25px; right: 25px;
            z-index: 50;
            text-align: center;
        }

        .music-circle {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--glass-core);
            border: 1.5px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        #musicToggleBtn {
            display: none;
            margin-top: 8px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            cursor: pointer;
        }

        /* --- MAIN "DOOR" UI --- */
        .door-container {
            position: absolute;
            top: 10%; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 800px;
            height: 260px;
            background: var(--glass-core);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer;
        }

        .mode-nav {
            position: absolute;
            top: 15px; right: 20px;
            display: flex; gap: 15px;
        }

        .mode-btn {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 1.5px; opacity: 0.4;
            transition: 0.3s;
        }

        .mode-btn.active { opacity: 1; color: var(--accent); font-weight: bold; }

        .time-display {
            font-size: clamp(4rem, 18vw, 7.5rem);
            font-weight: 800;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .status-txt {
            position: absolute; bottom: 15px;
            letter-spacing: 6px; font-size: 13px;
            color: var(--accent); text-transform: uppercase;
        }

        /* --- INFO BOX (BOTTOM LEFT) --- */
        .info-widget {
            position: absolute;
            bottom: 40px; left: 30px;
            padding: 15px 25px;
            background: var(--glass-core);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(8px);
        }

        #clock-view { font-size: 28px; font-weight: 600; display: block; }
        #date-view { font-size: 13px; opacity: 0.7; margin-top: 4px; display: block; }

        /* --- POPUP SETTINGS --- */
        .modal-blur {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 10, 0, 0.85);
            z-index: 100; display: none;
            justify-content: center; align-items: center;
        }

        .modal-box {
            background: #081208;
            border: 1.5px solid var(--accent);
            padding: 30px; border-radius: 20px;
            width: 85%; max-width: 380px;
        }

        .input-row { margin-bottom: 15px; }
        .input-row label { display: block; font-size: 11px; margin-bottom: 5px; opacity: 0.6; }
        .input-row input {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white;
        }
