<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clover Productivity Hub</title>
    <style>
        :root {
            --glass: rgba(0, 25, 0, 0.6);
            --accent: #a8e6cf;
            --border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #001100; color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 1. BACKGROUND VIDEO ENGINE */
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover; pointer-events: none;
        }

        .fallback-dim {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); z-index: -1;
        }

        /* 2. MUSIC ICON (Top Circle) */
        .music-wrapper {
            position: absolute; top: 30px; right: 30px;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }

        .music-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--glass); border: 2px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 24px; box-shadow: 0 0 15px rgba(168,230,207,0.4);
        }

        #music-status {
            margin-top: 8px; font-size: 10px; letter-spacing: 2px;
            background: var(--glass); padding: 4px 10px; border-radius: 10px;
            display: none; cursor: pointer; border: 1px solid var(--border);
        }

        /* 3. THE MAIN DOOR (Top Display) */
        .main-door {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 700px; height: 260px;
            background: var(--glass); border: 2px solid var(--border);
            border-radius: 25px; backdrop-filter: blur(12px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
        }

        .mode-tabs {
            position: absolute; top: 20px; right: 25px; display: flex; gap: 15px;
        }

        .mode-tab { font-size: 12px; opacity: 0.4; letter-spacing: 1px; text-transform: uppercase; }
        .mode-tab.active { opacity: 1; color: var(--accent); font-weight: bold; }

        .digits {
            font-size: clamp(3.5rem, 15vw, 6rem); font-weight: 800;
            letter-spacing: -2px; font-variant-numeric: tabular-nums;
        }

        .status-label {
            position: absolute; bottom: 20px; font-size: 14px;
            letter-spacing: 5px; color: var(--accent); text-transform: uppercase;
        }

        /* 4. DATE/TIME BOX (Bottom Left) */
        .info-box {
            position: absolute; bottom: 40px; left: 30px;
            padding: 20px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        #live-clock { font-size: 32px; font-weight: bold; display: block; }
        #live-date { font-size: 14px; opacity: 0.7; margin-top: 5px; display: block; }

        /* 5. SETTINGS POPUP */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 0, 0.9); z-index: 100;
            display: none; justify-content: center; align-items: center;
        }

        .popup {
            background: #0a180a; border: 1px solid var(--accent);
            padding: 30px; border-radius: 20px; width: 85%; max-width: 380px;
        }

        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; opacity: 0.6; margin-bottom: 5px; }
        .field input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); color: white; border-radius: 8px;
        }

        .btn-start { width: 100%; padding: 15px; background: var(--accent); color: #002; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* 6. DEBUG CONSOLE */
        #debug-log {
            position: fixed; bottom: 5px; right: 5px; font-size: 9px; color: #666;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="endlessrain.mp4" type="video/mp4">
    </video>
    <div class="fallback-dim"></div>

    <div class="music-wrapper">
        <div class="music-btn" id="musicBtn">🎵</div>
        <div id="music-status">PAUSE</div>
        <input type="file" id="musicIn" accept="audio/*" hidden>
    </div>

    <div class="main-door" id="mainDoor">
        <div class="mode-tabs">
            <span class="mode-tab active" id="tab-pomo">Pomodoro</span>
            <span class="mode-tab" id="tab-stop">Stopwatch</span>
            <span class="mode-tab" id="tab-time">Timer</span>
        </div>
        <div class="digits" id="timeDisplay">00:00:00</div>
        <div class="status-label" id="statusLabel">READY</div>
    </div>

    <div class="info-box">
        <span id="live-clock">00:00:00</span>
        <span id="live-date">...</span>
    </div>

    <div class="overlay" id="pomoPanel">
        <div class="popup">
            <h2 style="color:var(--accent); margin-top:0;">SESSION SETUP</h2>
            <div class="field">
                <label>TASK NAME</label>
                <input type="text" id="taskName" placeholder="STUDY">
            </div>
            <div class="field">
                <label>WORK MINUTES</label>
                <input type="number" id="workMins" value="65">
            </div>
            <div class="field">
                <label>BREAK MINUTES</label>
                <input type="number" id="breakMins" value="10">
            </div>
            <div class="field">
                <label>TOTAL CYCLES</label>
                <input type="number" id="cycleCount" value="7">
            </div>
            <button class="btn-start" onclick="startApp()">START SESSION</button>
            <button class="btn-start" style="background:transparent; color:white; border:1px solid white; margin-top:5px;" onclick="closeSettings()">CANCEL</button>
        </div>
    </div>

    <div id="debug-log">System: Ready</div>

    <script>
        const video = document.getElementById('bg-video');
        const log = document.getElementById('debug-log');
        
        // --- VIDEO DEBUG ---
        video.onerror = () => log.innerText = "Video Error: Check file name.";
        window.addEventListener('click', () => {
            video.play().catch(() => {});
            log.innerText = "System: Active";
        }, {once: true});

        // --- CLOCK ---
        function updateClock() {
            const d = new Date();
            document.getElementById('live-clock').innerText = d.toLocaleTimeString([], {hour12:false});
            document.getElementById('live-date').innerText = d.toLocaleDateString([], {weekday:'long', month:'short', day:'numeric'});
        }
        setInterval(updateClock, 1000); updateClock();

        // --- TIMER LOGIC ---
        let timer;
        let seconds = 0;
        let mode = 'pomo';
        let running = false;
        let isBreak = false;
        let cycles = 0;
        let task = "STUDY";

        function fmt(s) {
            const h = Math.floor(s/3600).toString().padStart(2,'0');
            const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
            const sc = (s%60).toString().padStart(2,'0');
            return `${h}:${m}:${sc}`;
        }

        // --- MODE SWITCHING ---
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.onclick = (e) => {
                e.stopPropagation();
                clearInterval(timer); running = false;
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                mode = tab.id.replace('tab-', '');
                seconds = 0;
                document.getElementById('timeDisplay').innerText = "00:00:00";
                document.getElementById('statusLabel').innerText = "READY";
            };
        });

        // --- INTERACTION ---
        document.getElementById('mainDoor').onclick = () => {
            if(!running && seconds === 0 && (mode === 'pomo' || mode === 'time')) {
                document.getElementById('pomoPanel').style.display = 'flex';
            } else {
                toggle();
            }
        };

        function closeSettings() { document.getElementById('pomoPanel').style.display = 'none'; }

        function startApp() {
            task = document.getElementById('taskName').value.toUpperCase() || "STUDY";
            seconds = document.getElementById('workMins').value * 60;
            cycles = document.getElementById('cycleCount').value;
            isBreak = false;
            closeSettings();
            document.getElementById('timeDisplay').innerText = fmt(seconds);
            toggle();
        }

        function toggle() {
            if(running) {
                clearInterval(timer);
                document.getElementById('statusLabel').innerText = "PAUSED";
            } else {
                timer = setInterval(tick, 1000);
                updateUI();
            }
            running = !running;
        }

        function tick() {
            if(mode === 'stop') {
                seconds++;
            } else {
                if(seconds <= 0) {
                    if(mode === 'pomo') {
                        if(!isBreak) {
                            isBreak = true;
                            seconds = document.getElementById('breakMins').value * 60;
                        } else {
                            cycles--;
                            if(cycles > 0) {
                                isBreak = false;
                                seconds = document.getElementById('workMins').value * 60;
                            } else {
                                clearInterval(timer); running = false; alert("All cycles done!"); return;
                            }
                        }
                        updateUI();
                    } else {
                        clearInterval(timer); running = false; alert("Time's up!"); return;
                    }
                } else {
                    seconds--;
                }
            }
            document.getElementById('timeDisplay').innerText = fmt(seconds);
        }

        function updateUI() {
            const lbl = document.getElementById('statusLabel');
            if(mode === 'stop') lbl.innerText = "STOPWATCH";
            else if(mode === 'time') lbl.innerText = "TIMER";
            else lbl.innerText = isBreak ? "BREAK" : task;
        }

        // --- MUSIC ENGINE ---
        const audio = new Audio(); audio.loop = true;
        document.getElementById('musicBtn').onclick = () => document.getElementById('musicIn').click();
        document.getElementById('musicIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                audio.src = URL.createObjectURL(f);
                audio.play();
                document.getElementById('music-status').style.display = 'block';
                document.getElementById('music-status').innerText = "PAUSE";
            }
        };
        document.getElementById('music-status').onclick = (e) => {
            e.stopPropagation();
            if(audio.paused) { audio.play(); e.target.innerText = "PAUSE"; }
            else { audio.pause(); e.target.innerText = "PLAY"; }
        };
    </script>
</body>
</html>
